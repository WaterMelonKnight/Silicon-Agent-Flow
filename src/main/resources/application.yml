spring:
  application:
    name: silicon-agent-flow

  main:
    allow-circular-references: true

  datasource:
    url: jdbc:h2:mem:silicondb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

server:
  port: 8080

logging:
  level:
    com.silicon.agentflow: DEBUG
    org.hibernate.SQL: DEBUG

# OpenROAD 配置
openroad:
  docker:
    enabled: false  # 设置为 true 启用 Docker 执行
    image: openroad/flow-ubuntu22.04
  timeout:
    minutes: 30

# EDA OpenROAD Flow Scripts 配置
eda:
  orfs:
    workspace: /workspace/OpenROAD-flow-scripts/flow  # ORFS flow 目录（包含 Makefile）
    docker:
      image: openroad/orfs:latest
      enabled: true
    timeout:
      minutes: 60
    default-design: designs/sky130hd/gcd/config.mk

# AI 优化配置
ai:
  optimization:
    enabled: true
    max-iterations: 10  # 最大优化迭代次数
    model: deepseek-chat  # DeepSeek 模型
  openai:
    api-key: ${OPENAI_API_KEY:sk-your-api-key}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}  # 可替换为 DeepSeek 或本地 API

