version: '3.8'

services:
  # Spring Boot 应用 (使用 H2 内存数据库)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: silicon-app
    ports:
      - "8080:8080"
    environment:
      SPRING_MAIN_ALLOW_CIRCULAR_REFERENCES: "true"
      SPRING_AI_OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-dummy-key-for-testing}
      SPRING_AI_OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
    volumes:
      # 挂载 Docker socket，实现 Docker-in-Docker
      - /var/run/docker.sock:/var/run/docker.sock
      # 挂载 OpenROAD-flow-scripts 目录
      - ../OpenROAD-flow-scripts:/workspace/OpenROAD-flow-scripts
      # 挂载 workspaces 目录（用户上传文件的工作区）
      - ./workspaces:/app/workspaces
    restart: on-failure

  # EDA Worker (Python)
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: silicon-worker
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
    restart: on-failure
