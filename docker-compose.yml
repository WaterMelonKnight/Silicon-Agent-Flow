version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: silicon-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: edadb
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot 应用
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: silicon-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/edadb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: rootpassword
      SPRING_MAIN_ALLOW_CIRCULAR_REFERENCES: "true"
      SPRING_AI_OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-dummy-key-for-testing}
      SPRING_AI_OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  # EDA Worker (Python)
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: silicon-worker
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
    restart: on-failure

volumes:
  mysql-data:
